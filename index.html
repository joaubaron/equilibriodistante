<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Álbum solo de Renato Russo, lançado em dezembro de 1995. O disco é inteiramente composto por regravações de canções clássicas e populares em italiano.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Equilibrio distante</title>
  <meta name="theme-color" content="#fefbea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      position: fixed;
    }

    .carousel {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow-x: scroll;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .carousel::-webkit-scrollbar { display: none; }

    .slide {
      flex: 0 0 100vw;
      width: 100vw;
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /* Controle de áudio — minimalista */
.audio-control {
  position: absolute;
  top: 55px;
  z-index: 30;
}

/* Lado esquerdo */
.audio-control.left {
  left: 16px;
}

/* Lado direito */
.audio-control.right {
  right: 16px;
}

.play-pause-btn {
  background: rgba(0, 0, 0, 0.65);
  border: 1.5px solid #ffcd7e;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  cursor: pointer;
  color: #ffcd7e;
  flex-shrink: 0;
  transition: transform 0.1s, background 0.15s;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.play-pause-btn:active  { transform: scale(0.90); }
.play-pause-btn.playing { background: rgba(255, 205, 126, 0.25); }

.track-name { display: none; }

    /* Indicador de página */
    .page-indicator {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 12px;
      font-family: monospace;
      color: rgba(255, 240, 200, 0.85);
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 14px;
      border-radius: 30px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      pointer-events: none;
      letter-spacing: 1px;
    }

    .swipe-hint {
      position: fixed;
      top: 50px;
      left: 120px;
      background: rgba(0,0,0,0.55);
      border-radius: 30px;
      padding: 5px 13px;
      font-size: 11px;
      color: #ffe0a3;
      pointer-events: none;
      backdrop-filter: blur(5px);
      z-index: 40;
      font-weight: 500;
      transition: opacity 1s;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>

<div class="carousel" id="carousel"></div>
<div class="page-indicator" id="pageIndicator">1 / 15</div>

    slideIndex: -1,
    trackIndex: 0,
    audio: null,
    btn: null,
    lbl: null

  function stopAll() {
    if (playing.audio) {
      playing.audio.onended = null;
      playing.audio.pause();
      playing.audio = null;
    }
    if (playing.btn) {
      playing.btn.textContent = "▶";
      playing.btn.classList.remove("playing");
      playing.btn = null;
    }
    playing.slideIndex = -1;
    playing.trackIndex = 0;
    playing.lbl = null;
  }

  function playTrack(slideIndex, trackIndex, btn, lbl) {
    const s = SLIDES[slideIndex];
    if (!s.tracks.length || trackIndex >= s.tracks.length) return;

    stopAll();

    const audio = new Audio(MP3_BASE + s.tracks[trackIndex]);
    playing = { slideIndex, trackIndex, audio, btn, lbl };

    if (lbl) lbl.textContent = s.labels[trackIndex] || s.tracks[trackIndex];
    btn.textContent = "⏸";
    btn.classList.add("playing");

    audio.play().catch(err => {
      console.warn("Não foi possível tocar:", err);
      btn.textContent = "▶";
      btn.classList.remove("playing");
    });

    audio.onended = () => {
      btn.textContent = "▶";
      btn.classList.remove("playing");
      playing = { slideIndex: -1, trackIndex: 0, audio: null, btn: null, lbl: null };
    };
  }

  const carousel = document.getElementById("carousel");

  SLIDES.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "slide";
    div.dataset.index = i;

    const img = document.createElement("img");
    img.src = IMG_BASE + s.img;
    img.alt = s.labels[0] || `Encarte ${i + 1}`;
    img.draggable = false;

    img.onerror = () => {
      if (img.dataset.fallback) return;
      img.dataset.fallback = "1";
      const fb = document.createElement("div");
      fb.style.cssText = "position:absolute;color:#e2c28b;font-size:1.4rem;text-align:center;font-weight:bold;";
      fb.textContent = s.labels[0] ? `🎵 ${s.labels[0]}` : `Encarte ${i + 1}`;
      div.appendChild(fb);
    };

    div.appendChild(img);
