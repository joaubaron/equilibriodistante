<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Braço Toca-Discos Cinemático</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at center,#252525 0%,#090909 70%);
display:flex;
align-items:center;
justify-content:center;
font-family:sans-serif;
}

/* ===== PLAYER ===== */

.record-player{
position:relative;
width:340px;
height:340px;
}

/* Disco */

.record{
position:absolute;
left:50%;
top:50%;
width:240px;
height:240px;
transform:translate(-50%,-50%);
border-radius:50%;
background:
repeating-radial-gradient(
circle at center,
#111 0px,
#111 4px,
#1b1b1b 5px,
#0c0c0c 7px
);

box-shadow:
0 0 0 2px #222,
0 0 50px rgba(0,0,0,.7),
inset 0 0 30px rgba(255,255,255,.04);

animation:spin 4s linear infinite;
}

.record::before{
content:"";
position:absolute;
inset:42%;
border-radius:50%;
background:
radial-gradient(circle,#c49b5e,#6f4b20);
box-shadow:
0 0 10px rgba(255,200,120,.3);
}

@keyframes spin{
from{ transform:translate(-50%,-50%) rotate(0deg); }
to{ transform:translate(-50%,-50%) rotate(360deg); }
}

/* ===== BRAÇO ===== */

.tonearm{
position:absolute;
right:48px;
top:42px;
width:170px;
height:170px;
transform-origin:82% 12%;
animation:armMove 5s ease-in-out infinite alternate;
filter:drop-shadow(0 10px 14px rgba(0,0,0,.65));
}

/* Movimento principal */

@keyframes armMove{
0%{
transform:rotate(24deg);
}
100%{
transform:rotate(-6deg);
}
}

/* Reflexo metálico passando */

.arm-shine{
position:absolute;
width:70px;
height:10px;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.9),
transparent
);
filter:blur(3px);
opacity:.6;
top:70px;
left:52px;
transform:rotate(-33deg);
animation:shine 2.6s linear infinite;
}

@keyframes shine{
0%{
opacity:0;
transform:
translateX(-30px)
rotate(-33deg);
}
50%{
opacity:.8;
}
100%{
opacity:0;
transform:
translateX(60px)
rotate(-33deg);
}
}

/* Vibração minúscula da agulha */

.needle{
animation:needleVibe .07s infinite alternate;
transform-origin:center;
}

@keyframes needleVibe{
from{
transform:translateX(0px);
}
to{
transform:translateX(.7px);
}
}

/* Glow */

.arm-glow{
position:absolute;
width:14px;
height:14px;
border-radius:50%;
background:#ffcc88;
right:38px;
top:18px;
box-shadow:
0 0 8px #ffcc88,
0 0 20px rgba(255,190,100,.5);
animation:pulse 1.4s ease-in-out infinite;
}

@keyframes pulse{
0%,100%{
opacity:.4;
transform:scale(.9);
}
50%{
opacity:1;
transform:scale(1.1);
}
}

</style>
</head>

<body>

<div class="record-player">

<div class="record"></div>

<div class="tonearm">

<div class="arm-shine"></div>
<div class="arm-glow"></div>

<svg viewBox="0 0 220 220" width="220" height="220">

<!-- sombra -->
<path
d="M170 30
L118 74
L58 150"
stroke="rgba(0,0,0,.4)"
stroke-width="16"
stroke-linecap="round"
/>

<!-- braço -->
<path
d="M170 30
L118 74
L58 150"
stroke="url(#metal)"
stroke-width="12"
stroke-linecap="round"
/>

<!-- detalhe interno -->
<path
d="M166 34
L116 76
L61 146"
stroke="rgba(255,255,255,.2)"
stroke-width="2"
stroke-linecap="round"
/>

<!-- cápsula -->
<g class="needle">

<rect
x="42"
y="146"
width="24"
height="15"
rx="3"
fill="#d4a86b"
/>

<rect
x="46"
y="149"
width="15"
height="7"
rx="2"
fill="#111"
/>

<line
x1="44"
y1="159"
x2="39"
y2="169"
stroke="#ffe2b4"
stroke-width="1.2"
/>

</g>

<!-- pivô -->
<circle
cx="170"
cy="30"
r="17"
fill="url(#pivot)"
/>

<circle
cx="170"
cy="30"
r="5"
fill="#f7d39b"
/>

<defs>

<linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#f4d7aa"/>
<stop offset="20%" stop-color="#8b6a42"/>
<stop offset="50%" stop-color="#f6ddb3"/>
<stop offset="100%" stop-color="#5d4529"/>
</linearGradient>

<radialGradient id="pivot">
<stop offset="0%" stop-color="#f8ddb0"/>
<stop offset="100%" stop-color="#7c5930"/>
</radialGradient>

</defs>

</svg>

</div>

</div>

</body>
</html>
