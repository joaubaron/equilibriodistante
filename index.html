<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Encarte · Gente</title>
  <meta name="theme-color" content="#fedc5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      position: fixed;
    }

    /* Carrossel horizontal com snap */
    .carousel {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow-x: scroll;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .carousel::-webkit-scrollbar { display: none; }

    /* Cada slide ocupa 100% da tela */
    .slide {
      flex: 0 0 100vw;
      width: 100vw;
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /* Controle de áudio */
    .audio-control {
      position: absolute;
      bottom: 20px;
      right: 16px;
      z-index: 30;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 10px 16px 10px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 0.5px solid rgba(255, 210, 100, 0.35);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .play-pause-btn {
      background: #ffcd7e;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      color: #1a1a1a;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .play-pause-btn:active { transform: scale(0.92); }

    .track-name {
      color: #f0e6d0;
      font-size: 0.78rem;
      font-weight: 500;
      max-width: 155px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: system-ui, 'Segoe UI', sans-serif;
      letter-spacing: 0.3px;
    }

    /* Indicador de página */
    .page-indicator {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 12px;
      font-family: monospace;
      color: rgba(255, 240, 200, 0.85);
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 14px;
      border-radius: 30px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      pointer-events: none;
      letter-spacing: 1px;
    }

    /* Hint de swipe (some depois de 4s) */
    .swipe-hint {
      position: fixed;
      top: 18px;
      right: 18px;
      background: rgba(0,0,0,0.55);
      border-radius: 30px;
      padding: 5px 13px;
      font-size: 11px;
      color: #ffe0a3;
      pointer-events: none;
      backdrop-filter: blur(5px);
      z-index: 40;
      font-weight: 500;
      transition: opacity 1s;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>

<div class="carousel" id="carousel"></div>
<div class="page-indicator" id="pageIndicator">1 / 15</div>

<script>
  // =========================================================
  // MAPEAMENTO: encarte → faixa(s) da pasta mp3
  // Slides sem tracks = sem botão de play (capa/contracapa)
  // Slides com 2 tracks tocam em sequência automática
  // =========================================================
  const SLIDES = [
    { img: "encarte1.webp",  tracks: [],                                                          labels: [] },
    { img: "encarte2.webp",  tracks: [],                                                          labels: [] },
    { img: "encarte3.webp",  tracks: ["01-Gente.mp3"],                                           labels: ["Gente"] },
    { img: "encarte4.webp",  tracks: ["02-Strani Amori.mp3", "03-I Venti Del Cuore.mp3"],        labels: ["Strani Amori", "I Venti Del Cuore"] },
    { img: "encarte5.webp",  tracks: ["04-Scrivimi.mp3", "05-Dolcissima Maria.mp3"],             labels: ["Scrivimi", "Dolcissima Maria"] },
    { img: "encarte6.webp",  tracks: ["06-LetteraLa.mp3", "07-Solitudine.mp3"],                  labels: ["LetteraLa", "Solitudine"] },
    { img: "encarte7.webp",  tracks: ["08-Passerà.mp3"],                                         labels: ["Passerà"] },
    { img: "encarte8.webp",  tracks: ["09-Come Fa Um Onda.mp3", "10-La Forza Della Vita.mp3"],   labels: ["Come Fa Um Onda", "La Forza Della Vita"] },
    { img: "encarte9.webp",  tracks: ["11-Due.mp3"],                                             labels: ["Due"] },
    { img: "encarte10.webp", tracks: ["12-Piú O Meno.mp3"],                                      labels: ["Piú O Meno"] },
    { img: "encarte11.webp", tracks: ["13-Vita È Adesso.mp3"],                                   labels: ["Vita È Adesso"] },
    { img: "encarte12.webp", tracks: [],                                                          labels: [] },
    { img: "encarte13.webp", tracks: [],                                                          labels: [] },
    { img: "encarte14.webp", tracks: [],                                                          labels: [] },
    { img: "encarte15.webp", tracks: [],                                                          labels: [] },
  ];

  const IMG_BASE  = "./encartes/";
  const MP3_BASE  = "./mp3/";
  const TOTAL     = SLIDES.length;

  // Estado global de reprodução
  let playing = {
    slideIndex: -1,
    trackIndex: 0,
    audio: null,
    btn: null,
    lbl: null
  };

  // Para toda reprodução ativa
  function stopAll() {
    if (playing.audio) {
      playing.audio.onended = null;
      playing.audio.pause();
      playing.audio = null;
    }
    if (playing.btn) {
      playing.btn.textContent = "▶";
      playing.btn = null;
    }
    playing.slideIndex = -1;
    playing.trackIndex = 0;
    playing.lbl = null;
  }

  // Toca a faixa trackIndex do slide slideIndex
  function playTrack(slideIndex, trackIndex, btn, lbl) {
    const s = SLIDES[slideIndex];
    if (!s.tracks.length || trackIndex >= s.tracks.length) return;

    stopAll();

    const audio = new Audio(MP3_BASE + s.tracks[trackIndex]);
    playing = { slideIndex, trackIndex, audio, btn, lbl };

    if (lbl) lbl.textContent = s.labels[trackIndex] || s.tracks[trackIndex];
    btn.textContent = "⏸";

    audio.play().catch(err => {
      console.warn("Não foi possível tocar:", err);
      btn.textContent = "▶";
    });

    // Ao terminar, toca a próxima faixa do mesmo slide (se houver)
    audio.onended = () => {
      const next = trackIndex + 1;
      if (next < s.tracks.length) {
        playTrack(slideIndex, next, btn, lbl);
      } else {
        btn.textContent = "▶";
        playing = { slideIndex: -1, trackIndex: 0, audio: null, btn: null, lbl: null };
      }
    };
  }

  // Toggle play/pause para um slide
  function togglePlay(slideIndex, btn, lbl) {
    if (playing.slideIndex === slideIndex && playing.audio) {
      if (playing.audio.paused) {
        playing.audio.play();
        btn.textContent = "⏸";
      } else {
        playing.audio.pause();
        btn.textContent = "▶";
      }
    } else {
      // Começa do início (faixa 0 do slide)
      playTrack(slideIndex, 0, btn, lbl);
    }
  }

  // Monta os slides dinamicamente
  const carousel = document.getElementById("carousel");

  SLIDES.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "slide";
    div.dataset.index = i;

    const img = document.createElement("img");
    img.src = IMG_BASE + s.img;
    img.alt = s.labels[0] || `Encarte ${i + 1}`;
    img.draggable = false;

    // Fallback visual se imagem não carregar
    img.onerror = () => {
      if (img.dataset.fallback) return;
      img.dataset.fallback = "1";
      const fb = document.createElement("div");
      fb.style.cssText = "position:absolute;color:#e2c28b;font-size:1.4rem;text-align:center;font-weight:bold;";
      fb.textContent = s.labels[0] ? `🎵 ${s.labels[0]}` : `Encarte ${i + 1}`;
      div.appendChild(fb);
    };

    div.appendChild(img);

    // Botão de play apenas para slides COM música
    if (s.tracks.length) {
      const ctrl = document.createElement("div");
      ctrl.className = "audio-control";

      const btn = document.createElement("button");
      btn.className = "play-pause-btn";
      btn.textContent = "▶";
      btn.setAttribute("aria-label", "Tocar / Pausar");

      const lbl = document.createElement("span");
      lbl.className = "track-name";
      lbl.textContent = s.labels[0] || "";

      btn.addEventListener("click", e => {
        e.stopPropagation();
        togglePlay(i, btn, lbl);
      });

      ctrl.appendChild(btn);
      ctrl.appendChild(lbl);
      div.appendChild(ctrl);
    }

    carousel.appendChild(div);
  });

  // Atualiza indicador de página ao rolar
  const pageIndicator = document.getElementById("pageIndicator");
  carousel.addEventListener("scroll", () => {
    const idx = Math.round(carousel.scrollLeft / carousel.clientWidth);
    pageIndicator.textContent = `${Math.min(idx + 1, TOTAL)} / ${TOTAL}`;
  }, { passive: true });

  // Pausa áudio quando o slide sair da tela
  const visObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) {
        const idx = parseInt(entry.target.dataset.index, 10);
        if (playing.slideIndex === idx && playing.audio && !playing.audio.paused) {
          playing.audio.pause();
          if (playing.btn) playing.btn.textContent = "▶";
        }
      }
    });
  }, { threshold: 0.4 });

  document.querySelectorAll(".slide").forEach(sl => visObserver.observe(sl));

  // Pausa ao esconder aba/app
  document.addEventListener("visibilitychange", () => {
    if (document.hidden && playing.audio) {
      playing.audio.pause();
      if (playing.btn) playing.btn.textContent = "▶";
    }
  });

  // Hint de swipe (some em 4s)
  const hint = document.createElement("div");
  hint.className = "swipe-hint";
  hint.innerHTML = "◀ deslize ▶";
  document.body.appendChild(hint);
  setTimeout(() => {
    hint.style.opacity = "0";
    setTimeout(() => hint.remove(), 1000);
  }, 4000);

  // Registra Service Worker
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/equilibriodistante/sw.js")
        .then(r => console.log("SW registrado:", r.scope))
        .catch(e => console.warn("SW falhou:", e));
    });
  }
</script>
</body>
</html>
