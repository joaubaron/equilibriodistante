<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Álbum solo de Renato Russo, lançado em dezembro de 1995. O disco é inteiramente composto por regravações de canções clássicas e populares em italiano.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Equilibrio distante</title>
  <meta name="theme-color" content="#fefbea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      position: fixed;
    }

    .carousel {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow-x: scroll;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .carousel::-webkit-scrollbar { display: none; }

    .slide {
      flex: 0 0 100vw;
      width: 100vw;
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /* Controle de áudio — minimalista */
    .audio-control {
      position: absolute;
      top: 55px;
      z-index: 30;
    }

    /* Lado esquerdo */
    .audio-control.left {
      left: 16px;
    }

    /* Lado direito */
    .audio-control.right {
      right: 16px;
    }

    .play-pause-btn {
      background: rgba(0, 0, 0, 0.65);
      border: 1.5px solid #ffcd7e;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      color: #ffcd7e;
      flex-shrink: 0;
      transition: transform 0.1s, background 0.15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .play-pause-btn:active  { transform: scale(0.90); }
    .play-pause-btn.playing { background: rgba(255, 205, 126, 0.25); }

    .track-name { display: none; }

    /* Indicador de página */
    .page-indicator {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 12px;
      font-family: monospace;
      color: rgba(255, 240, 200, 0.85);
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 14px;
      border-radius: 30px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      pointer-events: none;
      letter-spacing: 1px;
    }

    .swipe-hint {
      position: fixed;
      top: 50px;
      left: 135px;
      background: rgba(0,0,0,0.55);
      border-radius: 30px;
      padding: 5px 13px;
      font-size: 11px;
      color: #ffe0a3;
      pointer-events: none;
      backdrop-filter: blur(5px);
      z-index: 40;
      font-weight: 500;
      transition: opacity 1s;
      font-family: system-ui, sans-serif;
    }

    /* ── BARRA DE PROGRESSO ── */
    .progress-bar-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 205, 126, 0.2);
      cursor: pointer;
      z-index: 25;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #ffcd7e;
      pointer-events: none;
      transition: width 0.25s linear;
    }
  </style>
</head>
<body>

<div class="carousel" id="carousel"></div>
<div class="page-indicator" id="pageIndicator">1 / 16</div>

<script>
  // side: "left" | "right" | null (sem botão)
  const SLIDES = [
    { img: "encarte1.webp",  tracks: [],                                                         labels: [],                                    sides: [] },
    { img: "encarte2.webp",  tracks: [],                                                         labels: [],                                    sides: [] },
    { img: "encarte3.webp",  tracks: ["01-Gente.mp3"],                                          labels: ["Gente"],                             sides: ["right"] },
    { img: "encarte4.webp",  tracks: ["02-Strani Amori.mp3", "03-I Venti Del Cuore.mp3"],       labels: ["Strani Amori", "I Venti Del Cuore"], sides: ["left", "right"] },
    { img: "encarte5.webp",  tracks: ["04-Scrivimi.mp3", "05-Dolcissima Maria.mp3"],            labels: ["Scrivimi", "Dolcissima Maria"],       sides: ["left", "right"] },
    { img: "encarte6.webp",  tracks: ["06-LetteraLa.mp3", "07-Solitudine.mp3"],                 labels: ["LetteraLa", "Solitudine"],           sides: ["left", "right"] },
    { img: "encarte7.webp",  tracks: ["08-Passerà.mp3"],                                        labels: ["Passerà"],                           sides: ["right"] },
    { img: "encarte8.webp",  tracks: ["09-Come Fa Um Onda.mp3", "10-La Forza Della Vita.mp3"],  labels: ["Come Fa Um Onda", "La Forza Della Vita"], sides: ["left", "right"] },
    { img: "encarte9.webp",  tracks: ["11-Due.mp3"],                                            labels: ["Due"],                               sides: ["right"] },
    { img: "encarte10.webp", tracks: ["12-Piú O Meno.mp3"],                                     labels: ["Piú O Meno"],                        sides: ["left"] },
    { img: "encarte11.webp", tracks: ["13-Vita È Adesso.mp3"],                                  labels: ["Vita È Adesso"],                     sides: ["left"] },
    { img: "encarte12.webp", tracks: [],                                                         labels: [],                                    sides: [] },
    { img: "encarte13.webp", tracks: [],                                                         labels: [],                                    sides: [] },
    { img: "encarte14.webp", tracks: [],                                                         labels: [],                                    sides: [] },
    { img: "encarte15.webp", tracks: [],                                                         labels: [],                                    sides: [] },
    { img: "encarte16.webp", tracks: [],                                                         labels: [],                                    sides: [] },
  ];

  const IMG_BASE = "./encartes/";
  const MP3_BASE = "./mp3/";
  const TOTAL    = SLIDES.length;

  let playing = {
    slideIndex: -1,
    trackIndex: 0,
    audio: null,
    btn: null,
    lbl: null
  };

  function stopAll() {
    if (playing.audio) {
      playing.audio.onended = null;
      playing.audio.pause();
      playing.audio = null;
    }
    if (playing.btn) {
      playing.btn.textContent = "▶";
      playing.btn.classList.remove("playing");
      playing.btn = null;
    }
    playing.slideIndex = -1;
    playing.trackIndex = 0;
    playing.lbl = null;
  }

  function playTrack(slideIndex, trackIndex, btn, lbl) {
    const s = SLIDES[slideIndex];
    if (!s.tracks.length || trackIndex >= s.tracks.length) return;

    stopAll();

    const audio = new Audio(MP3_BASE + s.tracks[trackIndex]);
    playing = { slideIndex, trackIndex, audio, btn, lbl };

    if (lbl) lbl.textContent = s.labels[trackIndex] || s.tracks[trackIndex];
    btn.textContent = "⏸";
    btn.classList.add("playing");

    // ── BARRA DE PROGRESSO CORRIGIDA ──
    const slide = btn.closest(".slide");
    const fill = slide.querySelector(".progress-bar-fill");
    if (fill) {
      fill.style.width = "0%";
      const updateProgress = () => {
        if (audio.duration && !isNaN(audio.duration)) {
          fill.style.width = (audio.currentTime / audio.duration * 100) + "%";
        }
      };
      audio.addEventListener("timeupdate", updateProgress);
    }

    audio.play().catch(err => {
      console.warn("Não foi possível tocar:", err);
      btn.textContent = "▶";
      btn.classList.remove("playing");
    });

    audio.onended = () => {
      btn.textContent = "▶";
      btn.classList.remove("playing");
      if (fill) fill.style.width = "0%";
      playing = { slideIndex: -1, trackIndex: 0, audio: null, btn: null, lbl: null };
    };
  }

  const carousel = document.getElementById("carousel");

  SLIDES.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "slide";
    div.dataset.index = i;

    const img = document.createElement("img");
    img.src = IMG_BASE + s.img;
    img.alt = s.labels[0] || `Encarte ${i + 1}`;
    img.draggable = false;

    img.onerror = () => {
      if (img.dataset.fallback) return;
      img.dataset.fallback = "1";
      const fb = document.createElement("div");
      fb.style.cssText = "position:absolute;color:#e2c28b;font-size:1.4rem;text-align:center;font-weight:bold;";
      fb.textContent = s.labels[0] ? `🎵 ${s.labels[0]}` : `Encarte ${i + 1}`;
      div.appendChild(fb);
    };

    div.appendChild(img);

    if (s.tracks.length) {
      s.tracks.forEach((track, tIdx) => {
        const side = s.sides[tIdx] || "left";

        const ctrl = document.createElement("div");
        ctrl.className = `audio-control ${side}`;

        const btn = document.createElement("button");
        btn.className = "play-pause-btn";
        btn.textContent = "▶";
        btn.setAttribute("aria-label", "Tocar / Pausar");

        const lbl = document.createElement("span");
        lbl.className = "track-name";
        lbl.textContent = s.labels[tIdx] || track;

        btn.addEventListener("click", e => {
          e.stopPropagation();
          if (playing.slideIndex === i && playing.trackIndex === tIdx && playing.audio) {
            if (playing.audio.paused) {
              playing.audio.play();
              btn.textContent = "⏸";
              btn.classList.add("playing");
            } else {
              playing.audio.pause();
              btn.textContent = "▶";
              btn.classList.remove("playing");
            }
          } else {
            playTrack(i, tIdx, btn, lbl);
          }
        });

        ctrl.appendChild(btn);
        ctrl.appendChild(lbl);
        div.appendChild(ctrl);
      });

      // ── BARRA DE PROGRESSO ──
      const progressContainer = document.createElement("div");
      progressContainer.className = "progress-bar-container";
      const progressFill = document.createElement("div");
      progressFill.className = "progress-bar-fill";
      progressContainer.appendChild(progressFill);
      div.appendChild(progressContainer);

      // Clique e drag para seek
      const seek = e => {
        if (!playing.audio || playing.slideIndex !== i) return;
        const rect = progressContainer.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const ratio = Math.max(0, Math.min(1, x / rect.width));
        if (playing.audio.duration) {
          playing.audio.currentTime = ratio * playing.audio.duration;
        }
      };
      progressContainer.addEventListener("mousedown", seek);
      progressContainer.addEventListener("touchstart", seek, { passive: true });
      progressContainer.addEventListener("mousemove", e => { if (e.buttons === 1) seek(e); });
      progressContainer.addEventListener("touchmove", seek, { passive: true });
    }

    carousel.appendChild(div);
  });

  const pageIndicator = document.getElementById("pageIndicator");
  carousel.addEventListener("scroll", () => {
    const idx = Math.round(carousel.scrollLeft / carousel.clientWidth);
    pageIndicator.textContent = `${Math.min(idx + 1, TOTAL)} / ${TOTAL}`;
  }, { passive: true });

  document.addEventListener("visibilitychange", () => {
    if (document.hidden && playing.audio) {
      playing.audio.pause();
      if (playing.btn) {
        playing.btn.textContent = "▶";
        playing.btn.classList.remove("playing");
      }
    }
  });

  const hint = document.createElement("div");
  hint.className = "swipe-hint";
  hint.innerHTML = "◀ deslize ▶";
  document.body.appendChild(hint);
  setTimeout(() => {
    hint.style.opacity = "0";
    setTimeout(() => hint.remove(), 1000);
  }, 5000);

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/equilibrio/sw.js")
        .then(r => console.log("SW registrado:", r.scope))
        .catch(e => console.warn("SW falhou:", e));
    });
  }
</script>
</body>
</html>
